services:
  - type: web
    name: ai-data-analyst-assistant
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /_stcore/health
    envVars:
      - key: DEBUG
        value: "false"
      - key: HOST
        value: "0.0.0.0"
      - key: UPLOAD_FOLDER
        value: "data/uploads"
      - key: DATABASE_URL
        value: "sqlite:///data/app.db"
